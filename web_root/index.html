<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>网络端口转发管理面板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            padding: 30px 24px;
            color: #1e2a3a;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 24px 28px 32px 28px;
        }

        /* 头部与工具栏水平对齐 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            gap: 15px;
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 600;
            color: #0f2b3d;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 small {
            font-size: 0.8rem;
            font-weight: normal;
            background: #e9edf2;
            padding: 4px 12px;
            border-radius: 40px;
            color: #2c5a7a;
        }

        .add-btn {
            background: #1f6392;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .add-btn:hover {
            background: #0e4a70;
            transform: translateY(-1px);
        }

        /* 表格样式 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 880px;
        }

        .data-table th {
            text-align: left;
            padding: 16px 14px;
            background-color: #f8fafd;
            font-weight: 600;
            color: #1e4663;
            border-bottom: 1px solid #e2edf2;
            font-size: 0.85rem;
        }

        .data-table td {
            padding: 14px 14px;
            border-bottom: 1px solid #ecf3f8;
            vertical-align: middle;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* 目标主机列样式，必填所以不会有(空)占位符，但仍保留省略样式 */
        .data-table td:nth-child(6),
        .data-table th:nth-child(6) {
            max-width: 180px;
            width: 180px;
        }
        .host-cell {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: block;
            cursor: default;
        }
        .data-table td:nth-child(6) {
            word-break: keep-all;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
        }

        .status-running {
            background: #dff9e6;
            color: #1d7640;
        }

        .status-stopped {
            background: #ffe6e5;
            color: #bc3f2e;
        }

        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* 启停按钮降低高亮：浅色背景，柔和 */
        .btn-start {
            background: #eef2f6;
            color: #2c5f8a;
            border: 1px solid #cbdae6;
        }
        .btn-start:hover {
            background: #e2e9f0;
        }
        .btn-stop {
            background: #f0e6e4;
            color: #aa4a3a;
            border: 1px solid #e0cdc8;
        }
        .btn-stop:hover {
            background: #e8dbd8;
        }
        .btn-edit {
            background: #eef2ff;
            color: #2c5282;
            border: 1px solid #cbd5e0;
        }
        .btn-edit:hover {
            background: #e2e8ff;
        }

        button {
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.75rem;
            transition: 0.15s;
            font-family: inherit;
        }

        /* 模态窗样式 - 禁止点击空白关闭，无取消按钮，仅有X关闭，新建时删除按钮隐藏 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            width: 520px;
            max-width: 90%;
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: modalFadeIn 0.2s ease;
            pointer-events: auto;
        }

        @keyframes modalFadeIn {
            from {
                transform: scale(0.96);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px 24px 12px 24px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.35rem;
            font-weight: 600;
        }

        .close-modal {
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
            background: none;
            padding: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
        }

        .close-modal:hover {
            background: #f0f2f5;
        }

        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-row label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #2c5f8a;
        }
        .required-asterisk {
            color: #c2412c;
            margin-left: 2px;
        }

        .form-row input, .form-row select {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #cbdfe8;
            font-size: 0.9rem;
            background: #fff;
            transition: 0.2s;
        }

        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: #2c7eb6;
            box-shadow: 0 0 0 2px rgba(44,126,182,0.2);
        }

        .modal-footer {
            padding: 16px 24px 24px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            border-top: 1px solid #ecf3f8;
        }

        .btn-update {
            background: #1f6392;
            color: white;
            padding: 8px 20px;
        }
        .btn-delete {
            background: #c2412c;
            color: white;
        }
        /* 隐藏删除按钮的辅助类 */
        .hide-delete-btn {
            display: none !important;
        }

        /* 加载指示器 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }
        .loading-overlay.active {
            visibility: visible;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.6);
            border-top: 4px solid #1f6392;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .container { padding: 16px; }
            .header-section { flex-direction: column; align-items: stretch; }
            .add-btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h1>
            📡 转发规则管理器
            <small>端口映射表</small>
        </h1>
        <button class="add-btn" id="openCreateBtn">+ 新建规则</button>
    </div>
    <div class="table-wrapper">
        <table class="data-table" id="ruleTable">
            <thead>
                <tr>
                    <th>协议栈</th><th>监听端口</th><th>监听网络</th><th>目标端口</th><th>目标网络</th><th>目标主机</th><th>状态</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" style="text-align:center; padding: 40px;">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 编辑/新建 模态窗 -->
<div id="editModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle">✏️ 编辑转发规则</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editRowId" value="">
            <div class="form-row"><label>协议栈</label><select id="editProtocol"><option value="TCP">TCP</option><option value="UDP">UDP</option></select></div>
            <div class="form-row"><label>监听端口</label><input type="number" id="editListenPort" min="0" max="65535" step="1" placeholder="范围0-65535"></div>
            <div class="form-row"><label>监听网络</label><select id="editListenNet"><option value="IPv4">IPv4</option><option value="IPv6" selected>IPv6</option></select></div>
            <div class="form-row"><label>目标端口</label><input type="number" id="editForwardPort" min="0" max="65535" step="1" placeholder="范围0-65535"></div>
            <div class="form-row"><label>目标网络</label><select id="editTargetNet"><option value="IPv4" selected>IPv4</option><option value="IPv6">IPv6</option></select></div>
            <div class="form-row">
                <label>目标主机 <span class="required-asterisk" title="必填">*</span></label>
                <input type="text" id="editTargetHost" placeholder="内网或公网IPv4/IPv6地址">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-update" id="updateRuleBtn">提交</button>
            <button class="btn-delete" id="deleteRuleBtn">删除</button>
        </div>
    </div>
</div>

<!-- 全局加载遮罩 -->
<div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

<script>
    // ------------------- 后端接口配置（请根据实际后端地址修改）--------------------
    const API_BASE = '';  // 如果接口有统一前缀可在此配置，例如 '/api'，默认为空
    const API_LIST = `${API_BASE}/list`;
    const API_ADD = `${API_BASE}/add`;
    const API_UPDATE = `${API_BASE}/update`;
    const API_DELETE = `${API_BASE}/delete`;
    const API_OPTION = `${API_BASE}/option`;   // 启停操作接口: 预期接收 { idx: number, status: "运行中"/"未启动" }

    // 辅助: 显示/隐藏加载动画
    function showLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.classList.add('active');
    }
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.classList.remove('active');
    }

    // 通用请求封装 (带JSON处理)
    async function apiRequest(url, method, bodyData = null) {
        const options = {
            method: method,
            headers: {
                'Content-Type': 'application/json',
            },
        };
        if (bodyData) {
            options.body = JSON.stringify(bodyData);
        }
        const response = await fetch(url, options);
        if (!response.ok) {
            let errorMsg = `HTTP ${response.status}`;
            try {
                const errText = await response.text();
                errorMsg = errText || errorMsg;
            } catch(e) {}
            throw new Error(errorMsg);
        }
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
            return await response.json();
        }
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch {
            return { success: true, raw: text };
        }
    }

    // 获取所有规则 (GET /list)
    async function fetchRules() {
        showLoading();
        try {
            const result = await apiRequest(API_LIST, 'GET');
            let rulesArray = [];
            if (Array.isArray(result)) {
                rulesArray = result;
            } else if (result && Array.isArray(result.data)) {
                rulesArray = result.data;
            } else if (result && result.rules && Array.isArray(result.rules)) {
                rulesArray = result.rules;
            } else {
                rulesArray = [];
            }
            // 确保每条记录都有 idx 字段，并且对于旧数据若targetHost为空则后端可能已经存在空值，由于现在必填前端展示时不做额外处理（信任后端）
            const enriched = rulesArray.map((item, index) => {
                if (item.idx === undefined && item.idx !== 0) {
                    if (item.id !== undefined) item.idx = item.id;
                    else item.idx = index;
                }
                if (!item.status) item.status = "未启动";
                // 确保targetHost字段存在（必填，但向后兼容）
                if (item.targetHost === undefined) item.targetHost = "";
                return item;
            });
            return enriched;
        } catch (error) {
            console.error('获取规则列表失败:', error);
            alert(`加载规则失败: ${error.message}\n请确保后端服务已启动并且接口可访问。`);
            return [];
        } finally {
            hideLoading();
        }
    }

    // 新增规则 (POST /add)  目标主机必填校验在前端已经完成
    async function addRule(ruleData) {
        showLoading();
        try {
            const payload = {
                protocol: ruleData.protocol,
                listenPort: ruleData.listenPort,
                listenNet: ruleData.listenNet,
                forwardPort: ruleData.forwardPort,
                targetNet: ruleData.targetNet,
                targetHost: ruleData.targetHost.trim(),   // 必填，不为空
                status: ruleData.status || "未启动"
            };
            const result = await apiRequest(API_ADD, 'POST', payload);
            if (result.success === false) {
                throw new Error(result.message || '添加失败');
            }
            return result;
        } catch (error) {
            console.error('添加规则失败:', error);
            alert(`添加失败: ${error.message}`);
            throw error;
        } finally {
            hideLoading();
        }
    }

    // 提交规则 (POST /update) 目标主机必填
    async function updateRule(idx, ruleData) {
        showLoading();
        try {
            const payload = {
                idx: idx,
                protocol: ruleData.protocol,
                listenPort: ruleData.listenPort,
                listenNet: ruleData.listenNet,
                forwardPort: ruleData.forwardPort,
                targetNet: ruleData.targetNet,
                targetHost: ruleData.targetHost.trim(),
                status: ruleData.status
            };
            const result = await apiRequest(API_UPDATE, 'POST', payload);
            if (result.success === false) {
                throw new Error(result.message || '提交失败');
            }
            return result;
        } catch (error) {
            console.error('提交规则失败:', error);
            alert(`提交失败: ${error.message}`);
            throw error;
        } finally {
            hideLoading();
        }
    }

    // 删除规则 (POST /delete)
    async function deleteRule(idx) {
        showLoading();
        try {
            const payload = { idx: idx };
            const result = await apiRequest(API_DELETE, 'POST', payload);
            if (result.success === false) {
                throw new Error(result.message || '删除失败');
            }
            return result;
        } catch (error) {
            console.error('删除规则失败:', error);
            alert(`删除失败: ${error.message}`);
            throw error;
        } finally {
            hideLoading();
        }
    }

    // 修改状态
    async function changeStatusApi(idx, newStatus) {
        showLoading();
        try {
            const payload = { idx: idx, status: newStatus };
            const result = await apiRequest(API_OPTION, 'POST', payload);
            if (result.success === false) {
                throw new Error(result.message || '状态修改失败');
            }
            return result;
        } catch (error) {
            console.error('状态修改失败:', error);
            alert(`操作失败: ${error.message}`);
            throw error;
        } finally {
            hideLoading();
        }
    }

    // ---------- 页面渲染 ----------
    let currentRules = [];

    async function renderTableFromServer() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        try {
            const rules = await fetchRules();
            currentRules = rules;
            if (!rules || rules.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 40px;">暂无转发规则，点击“新建规则”添加</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            rules.forEach(rule => {
                const tr = document.createElement('tr');
                const idxVal = rule.idx;
                const tdProto = createCell(rule.protocol || 'TCP');
                const tdListenPort = createCell(rule.listenPort ?? '');
                const tdListenNet = createCell(rule.listenNet || 'IPv4');
                // 列名变更：转发至端口 -> 目标端口，展示字段仍为 forwardPort
                const tdForwardPort = createCell(rule.forwardPort ?? '');
                const tdTargetNet = createCell(rule.targetNet || 'IPv4');
                
                // 目标主机必填，展示时不会显示(空)，若后端意外返回空字符串展示为空但提醒数据异常，但按规则必填
                const tdTargetHost = document.createElement('td');
                const hostDisplay = (rule.targetHost && rule.targetHost.trim() !== "") ? rule.targetHost : "(无效-必填)";
                const hostSpan = document.createElement('span');
                hostSpan.className = 'host-cell';
                hostSpan.textContent = hostDisplay;
                hostSpan.title = rule.targetHost || '未提供';
                tdTargetHost.appendChild(hostSpan);
                
                const tdStatus = document.createElement('td');
                const statusSpan = document.createElement('span');
                const status = rule.status === '运行中' ? '运行中' : '未启动';
                statusSpan.className = `status-badge ${status === '运行中' ? 'status-running' : 'status-stopped'}`;
                statusSpan.textContent = status;
                tdStatus.appendChild(statusSpan);
                
                const tdAction = document.createElement('td');
                const actionDiv = document.createElement('div');
                actionDiv.className = 'action-group';
                
                const startStopBtn = document.createElement('button');
                if (status === '运行中') {
                    startStopBtn.textContent = '停止';
                    startStopBtn.className = 'btn-stop';
                    startStopBtn.onclick = () => handleStatusChange(idxVal, '未启动');
                } else {
                    startStopBtn.textContent = '启动';
                    startStopBtn.className = 'btn-start';
                    startStopBtn.onclick = () => handleStatusChange(idxVal, '运行中');
                }
                const editBtn = document.createElement('button');
                editBtn.textContent = '编辑';
                editBtn.className = 'btn-edit';
                editBtn.onclick = () => openEditModal(idxVal);
                
                actionDiv.appendChild(startStopBtn);
                actionDiv.appendChild(editBtn);
                tdAction.appendChild(actionDiv);
                
                tr.appendChild(tdProto);
                tr.appendChild(tdListenPort);
                tr.appendChild(tdListenNet);
                tr.appendChild(tdForwardPort);
                tr.appendChild(tdTargetNet);
                tr.appendChild(tdTargetHost);
                tr.appendChild(tdStatus);
                tr.appendChild(tdAction);
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error(err);
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 40px; color:red;">加载数据失败，请检查网络或后端服务</td></tr>';
        }
    }
    
    function createCell(content) {
        const td = document.createElement('td');
        td.textContent = content ?? '';
        return td;
    }
    
    async function handleStatusChange(idx, newStatus) {
        try {
            await changeStatusApi(idx, newStatus);
            await renderTableFromServer();
        } catch(e) {}
    }
    
    let currentEditIdx = null;
    async function openEditModal(idx) {
        const rule = currentRules.find(r => r.idx === idx);
        if (!rule) {
            alert('规则不存在或已被删除');
            return;
        }
        currentEditIdx = idx;
        document.getElementById('modalTitle').innerText = '✏️ 编辑转发规则';
        document.getElementById('editProtocol').value = rule.protocol || 'TCP';
        document.getElementById('editListenPort').value = rule.listenPort ?? '';
        document.getElementById('editListenNet').value = rule.listenNet || 'IPv6';
        document.getElementById('editForwardPort').value = rule.forwardPort ?? '';
        document.getElementById('editTargetNet').value = rule.targetNet || 'IPv4';
        document.getElementById('editTargetHost').value = rule.targetHost || '';
        document.getElementById('editRowId').value = idx;
        
        const deleteBtn = document.getElementById('deleteRuleBtn');
        if (deleteBtn) deleteBtn.classList.remove('hide-delete-btn');
        
        const modal = document.getElementById('editModal');
        modal.classList.add('active');
    }
    
    function openCreateModal() {
        currentEditIdx = null;
        document.getElementById('modalTitle').innerText = '➕ 新建转发规则';
        document.getElementById('editProtocol').value = 'TCP';
        document.getElementById('editListenPort').value = '';
        document.getElementById('editListenNet').value = 'IPv6';
        document.getElementById('editForwardPort').value = '';
        document.getElementById('editTargetNet').value = 'IPv4';
        document.getElementById('editTargetHost').value = '';
        document.getElementById('editRowId').value = '';
        
        const deleteBtn = document.getElementById('deleteRuleBtn');
        if (deleteBtn) deleteBtn.classList.add('hide-delete-btn');
        
        const modal = document.getElementById('editModal');
        modal.classList.add('active');
    }
    
    function closeModal() {
        const modal = document.getElementById('editModal');
        modal.classList.remove('active');
        currentEditIdx = null;
    }
    
    // 校验函数：端口校验，目标主机必填+地址格式校验
    function isValidPort(val) {
        if (val === undefined || val === null || val === '') return false;
        const num = Number(val);
        return !isNaN(num) && Number.isInteger(num) && num >= 0 && num <= 65535;
    }
    
    // 目标主机必填，并且必须符合对应网络的地址格式（IPv4 或 IPv6）
    function validateTargetHostRequired(host, netType) {
        if (!host || host.trim() === "") {
            return { valid: false, message: "目标主机为必填项，不能为空" };
        }
        const trimmed = host.trim();
        if (netType === 'IPv4') {
            const ipv4Regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            if (!ipv4Regex.test(trimmed)) {
                return { valid: false, message: "目标主机必须是合法的IPv4地址（例如 192.168.1.1）" };
            }
        } else if (netType === 'IPv6') {
            // 简洁但健壮的IPv6正则（支持标准IPv6地址）
            const ipv6Regex = /^(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$/;
            if (!ipv6Regex.test(trimmed)) {
                return { valid: false, message: "目标主机必须是合法的IPv6地址（例如 2001:db8::1 或 ::1）" };
            }
        }
        return { valid: true };
    }
    
    // 保存：新建或提交 (整合必填目标主机校验)
    async function handleSave() {
        const protocol = document.getElementById('editProtocol').value;
        const listenPortRaw = document.getElementById('editListenPort').value;
        const listenNet = document.getElementById('editListenNet').value;
        const forwardPortRaw = document.getElementById('editForwardPort').value;
        const targetNet = document.getElementById('editTargetNet').value;
        const targetHostRaw = document.getElementById('editTargetHost').value;
        const targetHost = targetHostRaw ? targetHostRaw.trim() : '';
        
        if (!isValidPort(listenPortRaw)) { alert('监听端口必须为0-65535数字'); return; }
        if (!isValidPort(forwardPortRaw)) { alert('目标端口必须为0-65535数字'); return; }
        const listenPort = Number(listenPortRaw);
        const forwardPort = Number(forwardPortRaw);
        
        // 目标主机必填校验 + 格式校验
        const hostValidation = validateTargetHostRequired(targetHost, targetNet);
        if (!hostValidation.valid) {
            alert(hostValidation.message);
            return;
        }
        
        if (currentEditIdx !== null) {
            const oldRule = currentRules.find(r => r.idx === currentEditIdx);
            const status = oldRule ? oldRule.status : "未启动";
            const updatePayload = {
                protocol, listenPort, listenNet, forwardPort, targetNet, targetHost,
                status: status
            };
            try {
                await updateRule(currentEditIdx, updatePayload);
                await renderTableFromServer();
                closeModal();
            } catch(e) {}
        } else {
            const newPayload = {
                protocol, listenPort, listenNet, forwardPort, targetNet, targetHost,
                status: "未启动"
            };
            try {
                await addRule(newPayload);
                await renderTableFromServer();
                closeModal();
            } catch(e) {}
        }
    }
    
    async function handleDelete() {
        if (currentEditIdx === null) return;
        const confirmed = confirm('⚠️ 确认删除\n\n确定要删除这条转发规则吗？操作不可撤销。');
        if (confirmed) {
            try {
                await deleteRule(currentEditIdx);
                await renderTableFromServer();
                closeModal();
            } catch(e) {}
        }
    }
    
    function bindEvents() {
        document.getElementById('openCreateBtn').addEventListener('click', openCreateModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('updateRuleBtn').addEventListener('click', handleSave);
        document.getElementById('deleteRuleBtn').addEventListener('click', handleDelete);
        const modalOverlay = document.getElementById('editModal');
        modalOverlay.addEventListener('click', (e) => {
            // 阻止背景关闭，仅当点击overlay自身时不予关闭（满足要求禁止点击空白关闭）
            e.stopPropagation();
        });
        const modalContainer = document.querySelector('#editModal .modal-container');
        if (modalContainer) modalContainer.addEventListener('click', (e) => e.stopPropagation());
    }
    
    async function init() {
        bindEvents();
        await renderTableFromServer();
    }
    init();
</script>
