<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>端口转发</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f9;
            padding: 28px 20px;
            color: #0a2a3b;
        }

        .container {
            max-width: 1360px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            padding: 24px 28px 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            gap: 16px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 650;
            background: linear-gradient(135deg, #1c5777, #123e56);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 small {
            background: #eef3fc;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 40px;
            color: #1f6392;
        }

        .add-btn {
            background: #1a6d96;
            border: none;
            padding: 10px 24px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        .add-btn:hover {
            background: #0e5478;
            transform: translateY(-1px);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            border: 1px solid #e6edf4;
            background: white;
        }

        .rule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 780px;
        }

        .rule-table th {
            text-align: left;
            padding: 16px 14px;
            background: #fafcff;
            font-weight: 600;
            color: #1d4e72;
            border-bottom: 1px solid #e9f0f5;
        }

        .rule-table td {
            padding: 14px 14px;
            border-bottom: 1px solid #f0f5fa;
            vertical-align: middle;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-active { background: #e2f3e8; color: #136b3c; }
        .status-inactive { background: #ffefed; color: #bc3f2e; }

        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #f0f4fa;
            border: 1px solid #dfe7ef;
            padding: 6px 14px;
            border-radius: 32px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }
        .action-btn.start { background: #e8f3ef; color: #146b3a; border-color: #c0e0d2; }
        .action-btn.stop { background: #feece9; color: #bc3f2e; border-color: #f5d7d2; }
        .action-btn.delete {
            background: #ffe8e5;
            color: #c2412c;
            border-color: #fad7d0;
        }
        .action-btn.delete:hover:not(:disabled) {
            background: #fdd9d4;
            transform: scale(0.97);
        }
        .action-btn.delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .action-btn:hover { filter: brightness(0.96); transform: scale(0.97); }

        /* 模态窗 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s ease;
        }
        .modal-mask.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: #ffffff;
            width: 540px;
            max-width: 92%;
            border-radius: 36px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transform: scale(0.98);
            transition: transform 0.2s;
        }
        .modal-mask.active .modal-card { transform: scale(1); }

        .modal-header {
            padding: 22px 26px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eff3f8;
        }
        .modal-header h3 {
            font-size: 1.4rem;
            font-weight: 650;
            background: linear-gradient(135deg, #1c5777, #1f6a8c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .close-icon {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            color: #6c8eae;
        }
        .close-icon:hover { background: #f0f4fa; color: #1f3b4c; }

        .modal-body {
            padding: 26px 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .field-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #2b5d84;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .combo-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .combo-row select, .combo-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 18px;
            border: 1px solid #d4e2ec;
            font-size: 0.9rem;
            background: #ffffff;
            transition: 0.2s;
            font-family: inherit;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #2f8db3;
            box-shadow: 0 0 0 3px rgba(47,141,179,0.15);
        }

        .host-input-wrapper {
            position: relative;
            width: 100%;
        }
        .host-input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border-radius: 24px;
            border: 1.5px solid #e2edf6;
            background: #fefefe;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .host-input-wrapper input:focus {
            border-color: #2f8db3;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(47,141,179,0.12);
        }
        .host-input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
            color: #6f9cbb;
        }
        .host-hint {
            font-size: 0.7rem;
            color: #628bad;
            margin-top: 5px;
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .host-hint span {
            background: #eff4fa;
            padding: 2px 8px;
            border-radius: 20px;
            font-family: monospace;
        }

        .modal-footer {
            padding: 16px 28px 26px;
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            border-top: 1px solid #ecf3f9;
            background: #fdfdfe;
        }
        .btn-submit {
            background: #1a6d96;
            color: white;
            padding: 8px 26px;
            border-radius: 34px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn-submit:hover { background: #0e5a7e; transform: scale(0.97); }
        .btn-cancel {
            background: #eef2f6;
            color: #2c5f8a;
            padding: 8px 20px;
            border-radius: 34px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #e2e8f0; }

        .loading-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }
        .loading-mask.active { visibility: visible; }
        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.8);
            border-top: 4px solid #1a6d96;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 提示 toast 样式 */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3e50;
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1200;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            animation: fadeInOut 2.5s ease forwards;
            pointer-events: none;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        @media (max-width: 640px) {
            .container { padding: 16px; }
            .combo-row { flex-direction: column; align-items: stretch; gap: 8px; }
            .modal-body { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ 端口转发管理面板 </h1>
        <button class="add-btn" id="openCreateBtn">✨ 新建规则</button>
    </div>
    <div class="table-wrapper">
        <table class="rule-table">
            <thead>
                <tr><th>监听端口</th><th>目标端口</th><th>目标主机</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="rulesTbody"><tr><td colspan="5" style="text-align:center; padding:44px;">⏳ 载入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 新建规则模态窗 -->
<div id="createModal" class="modal-mask">
    <div class="modal-card">
        <div class="modal-header">
            <h3>✨ 新建转发规则</h3>
            <button class="close-icon" id="closeCreateModalBtn">✕</button>
        </div>
        <div class="modal-body">
            <div class="field-group">
                <label>📡 监听端口</label>
                <div class="combo-row">
                    <select id="listenProtoSelect">
                        <option value="TCP4">TCP4</option>
                        <option value="TCP6">TCP6</option>
                        <option value="UDP4">UDP4</option>
                        <option value="UDP6">UDP6</option>
                    </select>
                    <input type="number" id="listenPortInput" placeholder="端口 0-65535" min="0" max="65535" step="1">
                </div>
            </div>
            <div class="field-group">
                <label>🎯 目标端口</label>
                <div class="combo-row">
                    <select id="targetProtoSelect"></select>
                    <input type="number" id="targetPortInput" placeholder="端口 0-65535" min="0" max="65535" step="1">
                </div>
            </div>
            <div class="field-group">
                <label>🌍 目标主机 <span style="font-weight: normal; font-size:0.7rem;">(IPv4 / IPv6)</span></label>
                <div class="host-input-wrapper">
                    <input type="text" id="targetHostInput" placeholder="本机或公网IPv4/6地址" autocomplete="off">
                </div>
                <div class="host-hint">
                    💡 留空自动填充默认地址： 
                    <span id="defaultHostPreview">127.0.0.1</span>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-submit" id="submitRuleBtn">✓ 添加规则</button>
            <button class="btn-cancel" id="cancelCreateBtn">取消</button>
        </div>
    </div>
</div>

<div id="globalLoading" class="loading-mask"><div class="spinner"></div></div>

<script>
    // ============================================================
    // 规则：运行中的数据不允许删除，必须先停止再删除
    // 添加、启停功能正常，删除按钮在运行中时置灰并提示
    // ============================================================

    const API_BASE = '';
    const ENDPOINTS = {
        list: '/list',
        add: '/add',
        delete: '/delete',
        toggle: '/toggle'
    };

    // ---------- 辅助函数 ----------
    function parseEndpoint(str) {
        const colonIdx = str.lastIndexOf(':');
        if (colonIdx === -1) return { proto: 'TCP4', port: 0 };
        const proto = str.substring(0, colonIdx);
        const port = parseInt(str.substring(colonIdx + 1), 10);
        return { proto, port: isNaN(port) ? 0 : port };
    }

    function buildEndpoint(proto, port) {
        return `${proto}:${port}`;
    }

    function getDefaultHostByProto(proto) {
        return proto.endsWith('4') ? '127.0.0.1' : '::1';
    }

    function updateDefaultHostPreview(proto) {
        const previewSpan = document.getElementById('defaultHostPreview');
        if (previewSpan) {
            previewSpan.innerText = proto.endsWith('4') ? '127.0.0.1' : '::1';
        }
    }

    function validateAndGetHost(hostRaw, targetProto) {
        let host = (hostRaw && typeof hostRaw === 'string') ? hostRaw.trim() : '';
        if (host === "") {
            return { valid: true, host: getDefaultHostByProto(targetProto) };
        }
        const isIPv4 = targetProto.endsWith('4');
        if (isIPv4) {
            const ipv4Regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            if (!ipv4Regex.test(host)) return { valid: false, message: "❌ 目标主机必须是合法的 IPv4 地址" };
        } else {
            const ipv6Regex = /^(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$/;
            if (!ipv6Regex.test(host)) return { valid: false, message: "❌ 目标主机必须是合法的 IPv6 地址" };
        }
        return { valid: true, host };
    }

    function getTargetProtoOptions(listenProto) {
        return listenProto.startsWith('TCP') ? ['TCP4', 'TCP6'] : ['UDP4', 'UDP6'];
    }

    function updateTargetProtoSelect(listenProtoValue, currentTargetProto = null) {
        const options = getTargetProtoOptions(listenProtoValue);
        const select = document.getElementById('targetProtoSelect');
        let currentVal = (currentTargetProto && options.includes(currentTargetProto)) ? currentTargetProto : options[0];
        select.innerHTML = '';
        options.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt;
            select.appendChild(option);
        });
        select.value = currentVal;
        updateDefaultHostPreview(currentVal);
    }

    // 友好提示（非错误弹窗）
    function showToast(message) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
    }

    // ---------- 网络请求 ----------
    let loadingCounter = 0;
    function showLoading() { if (loadingCounter++ === 0) document.getElementById('globalLoading')?.classList.add('active'); }
    function hideLoading() { if (--loadingCounter <= 0) { loadingCounter = 0; document.getElementById('globalLoading')?.classList.remove('active'); } }

    async function request(url, method, data = null, silent = false) {
        showLoading();
        try {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) opts.body = JSON.stringify(data);
            const response = await fetch(API_BASE + url, opts);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const json = await response.json();
            if (json && json.success === false) {
                if (!silent) alert(`⚠️ ${json.message || '请求失败'}`);
                throw new Error(json.message || '请求失败');
            }
            return json;
        } catch (err) {
            if (!silent) alert(`操作失败: ${err.message}`);
            throw err;
        } finally {
            hideLoading();
        }
    }

    // ---------- 业务 API ----------
    let rulesList = [];

    async function fetchRules() {
        try {
            const res = await request(ENDPOINTS.list, 'GET', null, true);
            let raw = Array.isArray(res) ? res : (res.data || res.rules || []);
            rulesList = raw.map((item, idx) => {
                const idVal = (item.id !== undefined && item.id !== null) ? item.id : (item.idx !== undefined ? item.idx : idx);
                let listenVal = item.listen;
                let targetVal = item.target;
                let hostVal = (item.host !== undefined) ? item.host : (item.targetHost || '');
                let statusVal = (item.status === 'active' || item.status === '运行中') ? 'active' : 'inactive';
                if (!listenVal && item.protocol && item.listenPort !== undefined) {
                    const protoPart = item.protocol === 'TCP' ? 'TCP' : 'UDP';
                    const netPart = (item.listenNet === 'IPv6' ? '6' : '4');
                    listenVal = `${protoPart}${netPart}:${item.listenPort}`;
                }
                if (!targetVal && item.protocol && item.forwardPort !== undefined) {
                    const protoPart = item.protocol === 'TCP' ? 'TCP' : 'UDP';
                    const netPart = (item.targetNet === 'IPv6' ? '6' : '4');
                    targetVal = `${protoPart}${netPart}:${item.forwardPort}`;
                }
                if (!listenVal) listenVal = 'TCP4:0';
                if (!targetVal) targetVal = 'TCP4:0';
                return { "id": idVal, "listen": listenVal, "target": targetVal, "host": hostVal, "status": statusVal };
            });
            return rulesList;
        } catch (e) {
            rulesList = [];
            return [];
        }
    }

    async function addRuleApi(rule) {
        return await request(ENDPOINTS.add, 'POST', {
            "listen": rule.listen,
            "target": rule.target,
            "host": rule.host,
            "status": rule.status
        });
    }

    async function deleteRuleApi(id) {
        return await request(ENDPOINTS.delete, 'POST', { "id": id });
    }

    async function toggleStatusApi(id, newStatus) {
        return await request(ENDPOINTS.toggle, 'POST', { "id": id, "status": newStatus });
    }

    // ---------- 渲染表格（运行中时删除按钮禁用 + 提示）----------
    async function renderTable() {
        const tbody = document.getElementById('rulesTbody');
        try {
            await fetchRules();
            if (!rulesList.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:44px; color:#8199ae;">✨ 暂无转发规则，点击“新建规则”创建</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            for (const rule of rulesList) {
                const tr = document.createElement('tr');
                const listenTd = document.createElement('td');
                listenTd.textContent = rule.listen;
                const targetTd = document.createElement('td');
                targetTd.textContent = rule.target;
                let displayHost = (rule.host && rule.host.trim() !== "") ? rule.host : (() => {
                    const proto = rule.target.split(':')[0];
                    return getDefaultHostByProto(proto);
                })();
                const hostTd = document.createElement('td');
                hostTd.innerHTML = `<span style="font-family: monospace; background:#f6fafd; padding:4px 12px; border-radius:30px;">${escapeHtml(displayHost)}</span>`;
                const isActive = rule.status === 'active';
                const statusTd = document.createElement('td');
                statusTd.innerHTML = `<span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? '● 运行中' : '○ 未启动'}</span>`;
                const actionTd = document.createElement('td');
                const btnGroup = document.createElement('div');
                btnGroup.className = 'action-group';
                
                // 启停按钮
                const toggleBtn = document.createElement('button');
                toggleBtn.textContent = isActive ? '停止' : '启动';
                toggleBtn.className = `action-btn ${isActive ? 'stop' : 'start'}`;
                toggleBtn.onclick = async () => {
                    const newStatus = isActive ? 'inactive' : 'active';
                    await toggleStatusApi(rule.id, newStatus);
                    await renderTable();
                };
                
                // 删除按钮：运行中时禁用并给出友好提示（不弹错误窗口）
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '删除';
                deleteBtn.className = 'action-btn delete';
                if (isActive) {
                    deleteBtn.disabled = true;
                    deleteBtn.style.opacity = '0.5';
                    deleteBtn.style.cursor = 'not-allowed';
                    deleteBtn.title = '请先停止规则后再删除';
                    deleteBtn.onclick = () => {
                        showToast('⚠️ 运行中的规则无法删除，请先点击「停止」后再删除');
                    };
                } else {
                    deleteBtn.disabled = false;
                    deleteBtn.onclick = async () => {
                        const confirmed = confirm(`⚠️ 确认删除规则\n监听：${rule.listen}\n目标：${rule.target}\n主机：${displayHost}\n\n此操作不可撤销。`);
                        if (confirmed) {
                            await deleteRuleApi(rule.id);
                            await renderTable();
                        }
                    };
                }
                
                btnGroup.appendChild(toggleBtn);
                btnGroup.appendChild(deleteBtn);
                actionTd.appendChild(btnGroup);
                
                tr.appendChild(listenTd);
                tr.appendChild(targetTd);
                tr.appendChild(hostTd);
                tr.appendChild(statusTd);
                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            }
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="5" style="color:#cc6b5c; text-align:center;">加载失败，请检查后端服务</td></tr>';
        }
    }

    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- 新建模态窗 ----------
    const createModal = document.getElementById('createModal');
    const listenProtoSelect = document.getElementById('listenProtoSelect');
    const listenPortInput = document.getElementById('listenPortInput');
    const targetProtoSelect = document.getElementById('targetProtoSelect');
    const targetPortInput = document.getElementById('targetPortInput');
    const targetHostInput = document.getElementById('targetHostInput');
    const submitBtn = document.getElementById('submitRuleBtn');
    const closeCreateBtn = document.getElementById('closeCreateModalBtn');
    const cancelCreateBtn = document.getElementById('cancelCreateBtn');

    function openCreateModal() {
        listenProtoSelect.value = 'TCP4';
        listenPortInput.value = '';
        updateTargetProtoSelect('TCP4', 'TCP4');
        targetPortInput.value = '';
        targetHostInput.value = '';
        updateDefaultHostPreview('TCP4');
        createModal.classList.add('active');
    }

    function closeCreateModal() {
        createModal.classList.remove('active');
    }

    async function handleAddRule() {
        const listenProto = listenProtoSelect.value;
        const listenPortRaw = listenPortInput.value;
        const targetProto = targetProtoSelect.value;
        const targetPortRaw = targetPortInput.value;
        const hostRaw = targetHostInput.value;

        if (!listenPortRaw || isNaN(listenPortRaw) || listenPortRaw < 0 || listenPortRaw > 65535) {
            alert('监听端口必须是 0-65535 的数字');
            return;
        }
        if (!targetPortRaw || isNaN(targetPortRaw) || targetPortRaw < 0 || targetPortRaw > 65535) {
            alert('目标端口必须是 0-65535 的数字');
            return;
        }
        const listenPort = Number(listenPortRaw);
        const targetPort = Number(targetPortRaw);
        const hostValidation = validateAndGetHost(hostRaw, targetProto);
        if (!hostValidation.valid) {
            alert(hostValidation.message);
            return;
        }
        const finalHost = hostValidation.host;
        const listenEndpoint = buildEndpoint(listenProto, listenPort);
        const targetEndpoint = buildEndpoint(targetProto, targetPort);

        const payload = {
            "listen": listenEndpoint,
            "target": targetEndpoint,
            "host": finalHost,
            "status": "inactive"
        };
        try {
            await addRuleApi(payload);
            await renderTable();
            closeCreateModal();
        } catch (err) {}
    }

    listenProtoSelect.addEventListener('change', (e) => {
        updateTargetProtoSelect(e.target.value, targetProtoSelect.value);
    });
    targetProtoSelect.addEventListener('change', (e) => updateDefaultHostPreview(e.target.value));

    document.getElementById('openCreateBtn').addEventListener('click', openCreateModal);
    closeCreateBtn.addEventListener('click', closeCreateModal);
    cancelCreateBtn.addEventListener('click', closeCreateModal);
    submitBtn.addEventListener('click', handleAddRule);
    
    createModal.addEventListener('click', (e) => { if (e.target === createModal) return; });

    renderTable();
</script>
</body>
</html>
